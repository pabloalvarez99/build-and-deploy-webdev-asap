<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Afiche Tu Farmacia</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Raleway:wght@300;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Nunito', sans-serif;
  }

  .poster {
    width: 600px;
    min-height: 900px;
    background: linear-gradient(160deg, #0a8f8f 0%, #0d7b78 40%, #0a6b6b 100%);
    border-radius: 24px;
    padding: 48px 44px;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,0.5);
  }

  .poster::before {
    content: '';
    position: absolute;
    top: -120px; right: -120px;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: rgba(255,255,255,0.06);
    pointer-events: none;
  }
  .poster::after {
    content: '';
    position: absolute;
    bottom: -80px; left: -80px;
    width: 300px; height: 300px;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
    pointer-events: none;
  }

  .logo-wrap {
    width: 100%;
    display: flex;
    justify-content: center;
    margin-bottom: 28px;
  }
  .logo-wrap img {
    width: 380px;
    height: auto;
  }

  .divider {
    width: 60px;
    height: 4px;
    background: rgba(255,255,255,0.4);
    border-radius: 2px;
    margin-bottom: 28px;
  }

  .headline {
    font-family: 'Raleway', sans-serif;
    font-weight: 900;
    font-size: 52px;
    color: #ffffff;
    text-align: center;
    line-height: 1.1;
    text-transform: uppercase;
    letter-spacing: -1px;
    margin-bottom: 12px;
    text-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  .headline span { color: #b2f0ee; }

  .subheadline {
    font-size: 18px;
    font-weight: 700;
    color: rgba(255,255,255,0.85);
    text-align: center;
    margin-bottom: 36px;
    letter-spacing: 0.5px;
  }

  .benefits {
    display: flex;
    gap: 16px;
    margin-bottom: 36px;
    width: 100%;
    justify-content: center;
  }
  .benefit {
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 12px;
    padding: 14px 18px;
    text-align: center;
    flex: 1;
  }
  .benefit .icon { font-size: 24px; margin-bottom: 6px; }
  .benefit .label {
    font-size: 12px;
    font-weight: 800;
    color: #ffffff;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .qr-section {
    background: #ffffff;
    border-radius: 20px;
    padding: 28px 36px;
    display: flex;
    align-items: center;
    gap: 28px;
    width: 100%;
    box-shadow: 0 10px 40px rgba(0,0,0,0.25);
    position: relative;
    z-index: 1;
  }
  .qr-section img {
    width: 140px;
    height: 140px;
    border-radius: 8px;
    flex-shrink: 0;
  }
  .qr-text { flex: 1; }
  .qr-title {
    font-family: 'Raleway', sans-serif;
    font-weight: 900;
    font-size: 22px;
    color: #0a7c7c;
    margin-bottom: 6px;
    line-height: 1.2;
  }
  .qr-url {
    font-size: 14px;
    font-weight: 800;
    color: #0a7c7c;
    margin-bottom: 10px;
    opacity: 0.8;
  }
  .qr-desc {
    font-size: 13px;
    color: #555;
    font-weight: 600;
    line-height: 1.5;
  }

  .bottom-tag {
    margin-top: 28px;
    background: rgba(0,0,0,0.2);
    border-radius: 100px;
    padding: 10px 24px;
    font-size: 13px;
    font-weight: 700;
    color: rgba(255,255,255,0.75);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
</style>
</head>
